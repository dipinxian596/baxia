<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>甘龙镇中学八下道德与法治 · 单元复习交互课件</title>
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --primary: #1a56db;
    --primary-light: #e8f0fe;
    --accent: #d97706;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --success: #059669;
    --danger: #dc2626;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 30%, #f0f4ff 60%, #fef3c7 100%);
    min-height: 100vh;
    color: var(--text);
    line-height: 1.6;
  }
  .header {
    background: linear-gradient(135deg, #1e3a5f, #1a56db);
    color: #fff;
    padding: 28px 20px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.15);
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .header .sub { font-size: 13px; opacity: .85; margin-top: 6px; }
  .header .badge {
    display: inline-block;
    margin-top: 8px;
    background: rgba(255,255,255,.2);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: .5px;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 20px 16px 40px; }

  .progress-bar-wrap {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-bar {
    flex: 1;
    height: 10px;
    background: #e2e8f0;
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #1a56db, #3b82f6);
    transition: width .4s ease;
    border-radius: 5px;
  }
  .progress-text { font-size: 13px; color: var(--text-light); white-space: nowrap; font-weight: 500; }

  .unit-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .unit-btn {
    flex: 1 1 calc(20% - 8px);
    min-width: 100px;
    padding: 12px 8px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all .2s;
    text-align: center;
    line-height: 1.4;
  }
  .unit-btn:hover { border-color: var(--primary); background: var(--primary-light); }
  .unit-btn.active { border-color: var(--primary); background: var(--primary); color: #fff; box-shadow: 0 0 0 3px rgba(26,86,219,.2); }
  .unit-btn.done { border-color: var(--success); background: #ecfdf5; }
  .unit-btn .num { display: block; font-size: 11px; opacity: .7; font-weight: 400; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    transition: all .3s;
  }
  .card:hover { box-shadow: var(--shadow-lg); }
  .card h2 { font-size: 20px; color: var(--primary); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .card .unit-kw {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 16px;
    padding: 8px 12px;
    background: #f8fafc;
    border-radius: 6px;
    border-left: 3px solid var(--accent);
  }

  .knowledge-list { display: flex; flex-direction: column; gap: 10px; }
  .k-item {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    cursor: pointer;
    transition: all .2s;
    background: #fafbfc;
  }
  .k-item:hover { border-color: var(--primary); background: var(--primary-light); }
  .k-item .k-title { font-weight: 600; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
  .k-item .k-detail { max-height: 0; overflow: hidden; transition: max-height .4s ease, margin .4s ease; font-size: 14px; color: var(--text-light); }
  .k-item.open .k-detail { max-height: 300px; margin-top: 10px; }
  .k-item .arrow { transition: transform .3s; font-size: 12px; color: var(--text-light); }
  .k-item.open .arrow { transform: rotate(180deg); }
  .k-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    margin-right: 4px;
  }
  .tag-important { background: #fef2f2; color: #dc2626; }
  .tag-key { background: #eff6ff; color: #1a56db; }
  .tag-basic { background: #f0fdf4; color: #059669; }

  .quiz-section { margin-top: 20px; }
  .quiz-header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .quiz-header-bar h3 { font-size: 17px; color: #1e293b; margin: 0; }
  .quiz-pagination { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .quiz-pagination button {
    width: 32px; height: 32px; border: 1px solid var(--border);
    border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all .15s; color: var(--text);
  }
  .quiz-pagination button:hover { border-color: var(--primary); background: var(--primary-light); }
  .quiz-pagination button.answered-correct { background: #d1fae5; border-color: var(--success); color: var(--success); }
  .quiz-pagination button.answered-wrong { background: #fee2e2; border-color: var(--danger); color: var(--danger); }
  .quiz-pagination button.active-q { background: var(--primary); color: #fff; border-color: var(--primary); }
  .quiz-pagination .sep { color: var(--text-light); font-size: 13px; margin: 0 2px; }

  .quiz-card {
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    background: #fafbfc;
  }
  .quiz-card .q-num { font-size: 12px; color: var(--text-light); margin-bottom: 6px; font-weight: 500; }
  .quiz-card .q-text { font-size: 15px; font-weight: 600; margin-bottom: 16px; line-height: 1.6; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all .2s;
    background: #fff;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .option:hover { border-color: var(--primary); }
  .option.selected { border-color: var(--primary); background: var(--primary-light); }
  .option.correct { border-color: var(--success); background: #ecfdf5; color: var(--success); }
  .option.wrong { border-color: var(--danger); background: #fef2f2; color: var(--danger); }
  .option .opt-letter {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; flex-shrink: 0;
    border: 2px solid var(--border); background: #f8fafc;
  }
  .option.correct .opt-letter { border-color: var(--success); background: #d1fae5; }
  .option.wrong .opt-letter { border-color: var(--danger); background: #fee2e2; }

  .feedback {
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; }
  .feedback.wrong { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }

  .quiz-nav-row { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #1e40af; }
  .btn-outline { background: #fff; border: 2px solid var(--primary); color: var(--primary); }
  .btn-outline:hover { background: var(--primary-light); }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

  .mindmap {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; overflow-x: auto;
  }
  .mindmap svg { display: block; margin: 0 auto; }

  .stats-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 80px; background: var(--card);
    border-radius: var(--radius-sm); padding: 14px;
    text-align: center; box-shadow: var(--shadow);
  }
  .stat-card .val { font-size: 28px; font-weight: 700; color: var(--primary); }
  .stat-card .lbl { font-size: 12px; color: var(--text-light); margin-top: 2px; }

  .footer { text-align: center; padding: 20px; font-size: 12px; color: var(--text-light); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn .4s ease; }

  @media (max-width: 600px) {
    .unit-btn { flex: 1 1 calc(33.33% - 8px); font-size: 12px; }
    .header h1 { font-size: 18px; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>八年级下册 · 道德与法治</h1>
  <div class="sub">2026版统编教材 · 2022版新课标 · 单元复习交互课件</div>
  <div class="badge">核心主题：坚持宪法至上，崇尚法治精神</div>

<div class="container">

  </div>

  <div class="unit-nav fade-in" id="unitNav"></div>

  <div class="footer">
    星光 · 教学助手 &nbsp; | &nbsp; 紧扣2022版新课标，基于2026版统编教材

</div>

// ==================== 状态 ====================
let currentUnit = 0;
let quizState = {};
let totalQuestions = 0;
let answeredQuestions = 0;
let correctCount = 0;
let currentStreak = 0;
let currentQuizIdx = 0;  // 每单元当前显示的题目索引

// 初始化 quizState
unitData.forEach(u => {
  quizState[u.id] = {};
  u.quiz.forEach((q, i) => {
    quizState[u.id][i] = { selected: null, status: null };
  });
  totalQuestions += u.quiz.length;
});

// ==================== 渲染 ====================
function renderUnitNav() {
  const nav = document.getElementById('unitNav');
  nav.innerHTML = unitData.map((u, i) => {
    const done = u.quiz.every((q, qi) => quizState[u.id][qi].status === 'correct');
    const active = i === currentUnit ? ' active' : '';
    const doneCls = done ? ' done' : '';
    return `<button class="unit-btn${active}${doneCls}" onclick="switchUnit(${i})">
      <span class="num">单元${u.id}</span> ${u.titleShort}
    </button>`;
  }).join('');
}

function renderUnit() {
  const u = unitData[currentUnit];
  let html = `<div class="card fade-in">
    <h2>${u.title}</h2>
    <div class="unit-kw">${u.kw}</div>`;

  // 知识点
  html += `<div class="knowledge-list">`;
  u.lessons.forEach(lesson => {
    html += `<div style="font-weight:700;font-size:16px;margin:8px 0 6px;color:#1e293b">${lesson.title}</div>`;
    lesson.points.forEach(p => {
      const tagCls = p.tag === 'important' ? 'tag-important' : p.tag === 'key' ? 'tag-key' : 'tag-basic';
      const tagText = p.tag === 'important' ? '重点' : p.tag === 'key' ? '核心' : '基础';
      html += `<div class="k-item" onclick="this.classList.toggle('open')">
        <div class="k-title">
          <span>${p.text}</span>
          <span class="k-tag ${tagCls}">${tagText}</span>
        </div>
        <div class="k-detail">
          <span class="arrow">▼</span> 点击展开查看详情
        </div>
      </div>`;
    });
  });
  html += `</div>`;

  // 练习区 - 带分页
  const qi = currentQuizIdx;
  const q = u.quiz[qi];
  const state = quizState[u.id][qi];

  // 分页按钮
  let paginationHtml = '';
  u.quiz.forEach((qq, ii) => {
    const s = quizState[u.id][ii];
    let cls = '';
    if (s.status === 'correct') cls = ' answered-correct';
    else if (s.status === 'wrong') cls = ' answered-wrong';
    if (ii === qi) cls += ' active-q';
    paginationHtml += `<button class="${cls}" onclick="goToQuiz(${ii})">${ii + 1}</button>`;
  });

  html += `<div class="quiz-section">
    <div class="quiz-header-bar">
      <h3>单元练习（${u.quiz.length} 题）</h3>
      <div class="quiz-pagination">${paginationHtml}</div>
    </div>
    <div class="quiz-card fade-in">
      <div class="q-num">第 ${qi + 1} / ${u.quiz.length} 题</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts-${u.id}-${qi}">`;
  q.opts.forEach((opt, oi) => {
    const letter = 'ABCD'[oi];
    let cls = '';
    if (state.status === 'correct' && state.selected === oi) cls = ' correct';
    else if (state.status === 'wrong' && state.selected === oi) cls = ' wrong';
    else if (state.selected === oi && state.status === null) cls = ' selected';
    const disabled = state.status !== null ? 'style="pointer-events:none"' : '';
    html += `<div class="option${cls}" onclick="answer(${u.id},${qi},${oi})" ${disabled}>
      <span class="opt-letter">${letter}</span>${opt}
    </div>`;
  });
  html += `</div>
      <div class="feedback" id="fb-${u.id}-${qi}"></div>
      <div class="quiz-nav-row" style="margin-top:12px">
        <button class="btn btn-sm btn-outline" onclick="prevQuiz()" ${qi===0?'disabled':''}>上一题</button>
        <button class="btn btn-sm btn-outline" onclick="nextQuiz()" ${qi>=u.quiz.length-1?'disabled':''}>下一题</button>
        <span style="margin-left:auto;font-size:13px;color:var(--text-light)">${qi+1}/${u.quiz.length}</span>
      </div>
    </div>
  </div>`;

  // 思维导图按钮
  html += `<div class="btn-row">
    <button class="btn btn-primary" onclick="showMindmap()">查看本单元思维导图</button>
    <button class="btn btn-outline" id="resetUnitBtn" onclick="resetUnit(${u.id})">重做本单元练习</button>
  </div>`;

  html += `</div>`;
  document.getElementById('mainContent').innerHTML = html;

  // 恢复已答题目的 feedback
  if (state.status) {
    const fb = document.getElementById(`fb-${u.id}-${qi}`);
    if (fb) {
      fb.className = 'feedback show ' + state.status;
      fb.innerHTML = state.status === 'correct'
        ? '回答正确！'
        : `回答错误。正确答案是 <b>${'ABCD'[q.ans]}. ${q.opts[q.ans]}</b>`;
    }
  }
}

function goToQuiz(qi) {
  currentQuizIdx = qi;
  renderUnit();
}

function prevQuiz() {
  if (currentQuizIdx > 0) {
    currentQuizIdx--;
    renderUnit();
  }
}

function nextQuiz() {
  const u = unitData[currentUnit];
  if (currentQuizIdx < u.quiz.length - 1) {
    currentQuizIdx++;
    renderUnit();
  }
}

function answer(unitId, qi, selected) {
  const q = unitData.find(u => u.id === unitId).quiz[qi];
  const state = quizState[unitId][qi];
  if (state.status !== null) return; // 已答

  state.selected = selected;
  state.status = selected === q.ans ? 'correct' : 'wrong';

  if (state.status === 'correct') {
    correctCount++;
    currentStreak++;
  } else {
    currentStreak = 0;
  }
  answeredQuestions++;

  // 自动跳到下一题
  const u = unitData[currentUnit];
  if (qi < u.quiz.length - 1) {
    currentQuizIdx = qi + 1;
  }

  updateStats();
  renderUnit();
  renderUnitNav();
}

function resetUnit(unitId) {
  const u = unitData.find(u => u.id === unitId);
  u.quiz.forEach((q, qi) => {
    const state = quizState[unitId][qi];
    if (state.status === 'correct') correctCount--;
    state.selected = null;
    state.status = null;
  });
  answeredQuestions = Math.max(0, answeredQuestions - u.quiz.length);
  currentQuizIdx = 0;
  updateStats();
  renderUnit();
  renderUnitNav();
}

function switchUnit(idx) {
  currentUnit = idx;
  currentQuizIdx = 0;
  renderUnit();
  renderUnitNav();
  document.getElementById('mainContent').scrollIntoView({ behavior: 'smooth' });
}

function updateStats() {
  document.getElementById('totalQuiz').textContent = totalQuestions;
  document.getElementById('doneQuiz').textContent = answeredQuestions;
  const rate = answeredQuestions > 0 ? Math.round(correctCount / answeredQuestions * 100) : 0;
  document.getElementById('scoreRate').textContent = rate + '%';
  document.getElementById('streak').textContent = currentStreak;

  const doneUnits = unitData.filter(u => u.quiz.every((q, qi) => quizState[u.id][qi].status === 'correct')).length;
  const pct = Math.round(doneUnits / 5 * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${doneUnits} / 5 单元`;
}

// ==================== 思维导图 ====================
function showMindmap() {
  const u = unitData[currentUnit];
  const svgW = 800, svgH = 500;
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${svgW} ${svgH}" style="max-width:100%;height:auto">
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#1a56db"/>
        <stop offset="100%" stop-color="#3b82f6"/>
      </linearGradient>
    </defs>
    <rect rx="15" ry="15" width="${svgW}" height="${svgH}" fill="#f8fafc"/>
    <rect x="300" y="200" width="200" height="60" rx="10" fill="url(#grad)"/>
    <text x="400" y="237" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">${u.titleShort}</text>`;

  const colors = ['#1a56db','#7c3aed','#059669','#d97706','#dc2626','#2563eb','#9333ea','#0891b2'];
  u.lessons.forEach((lesson, li) => {
    const cx = 400, cy = 270 + li * 70;
    svg += `<line x1="${li % 2 === 0 ? 310 : 490}" y1="230" x2="${li % 2 === 0 ? 180 : 620}" y2="${cy}" stroke="${colors[li]}" stroke-width="2" stroke-dasharray="4,2"/>`;
    svg += `<rect x="${li % 2 === 0 ? 80 : 540}" y="${cy - 15}" width="180" height="40" rx="8" fill="${colors[li]}" opacity=".9"/>`;
    svg += `<text x="${li % 2 === 0 ? 170 : 630}" y="${cy + 11}" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">${lesson.title}</text>`;
  });

  svg += `</svg>`;

  const mindmapHtml = `<div class="card fade-in">
    <h2>${u.title} · 思维导图</h2>
    <div class="mindmap">${svg}</div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn btn-outline" onclick="renderUnit()">← 返回知识点</button>
    </div>
  </div>`;
  document.getElementById('mainContent').innerHTML = mindmapHtml;
}

// ==================== 初始化 ====================
function init() {
  renderUnitNav();
  renderUnit();
  updateStats();
}

init();
</script>

</body>
</html>
