<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>甘龙镇中学课堂分层课件登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        /* 暖调温馨渐变：豆沙粉 + 奶米黄 + 浅橘色，无冷蓝色 */
        body {
            background: linear-gradient(120deg, #ffe8ec, #fff5e6, #fff0d9);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .login-box {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.85);
            padding: 45px 35px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            font-size: 36px;
            color: #444;
            margin-bottom: 35px;
        }
        .form-item {
            margin: 22px 0;
        }
        label {
            font-size: 22px;
            display: block;
            margin-bottom: 10px;
            color: #333;
        }
        input {
            width: 100%;
            font-size: 22px;
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 24px;
            background: #64a8e8;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn:hover {
            background: #428cd8;
        }
        .teacher-btn {
            margin-top: 20px;
            background: #ffb366;
        }
        .teacher-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-inner {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 420px;
            text-align: center;
        }
        .modal-inner h3 {
            font-size:26px;
            margin-bottom:20px;
        }
        .content-wrap {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            display: none;
        }
        h2 {
            font-size: 32px;
            color: #333;
            margin: 30px 0 20px;
            border-bottom: 3px solid #e69c75;
            display: inline-block;
            padding-bottom: 8px;
        }
        /* 横向导航容器：弹性自动换行 */
        .nav-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-bottom:10px;
        }
        /* 导航按钮卡片样式 */
        .nav-row a {
            display: block;
            min-width: 200px;
            padding:16px 10px;
            font-size: 24px;
            color: #c26538;
            text-decoration: none;
            border:2px solid #e69c75;
            border-radius:12px;
            background:rgba(255,255,255,0.6);
            transition: all 0.2s ease;
        }
        .nav-row a:hover {
            background:#e69c75;
            color:#fff;
            transform: scale(1.04);
        }
        .record-tip {
            margin-top: 40px;
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="teacher-modal" id="teacherModal">
        <div class="modal-inner">
            <h3>教师身份验证</h3>
            <input type="password" id="teacherPwdInput" placeholder="输入教师专属密码">
            <button class="btn" onclick="checkTeacherPwd()">确认查看当月兑换码</button>
            <button class="btn" style="background:#999;margin-top:10px" onclick="closeTeacherModal()">关闭</button>
        </div>
    </div>
    <div class="login-box" id="loginArea">
        <h1>课堂课件访问验证</h1>
        <div class="form-item">
            <label>班级（如：801班）</label>
            <input type="text" id="className" placeholder="请输入你的班级">
        </div>
        <div class="form-item">
            <label>姓名</label>
            <input type="text" id="stuName" placeholder="请输入你的姓名">
        </div>
        <div class="form-item">
            <label>当月兑换码（向老师获取）</label>
            <input type="text" id="codeInput" placeholder="输入本月6位数字兑换码">
        </div>
        <button class="btn" onclick="verifyAll()">进入课件</button>
        <button class="btn teacher-btn" onclick="openTeacherModal()">教师入口：查看当月兑换码</button>
    </div>
    <div class="content-wrap" id="courseArea">
        <h1>甘龙镇中学分层教学&中考专项课件汇总</h1>

        <h2>难易分层课件</h2>
        <div class="nav-row">
            <a href="./easy/">简单难度课件</a>
            <a href="./middle/">中等难度课件</a>
            <a href="./hard/">困难难度课件</a>
        </div>

        <h2>专项课件</h2>
        <div class="nav-row">
            <a href="./siweidaotu/">思维导图</a>
            <a href="./xuanzeti/">选择题专项</a>
            <a href="./zongfuxi/">总复习课件一</a>
            <a href="./lxkj/">总复习课件二</a>
            <a href="./banianji/">八年级道法电子课本与资料</a>
            <a href="./monishijuan/m1.html">模拟试卷一</a>
            <a href="./monishijuan/m2.html">模拟试卷二</a>
        </div>

        <p class="record-tip">你的学习记录已自动保存，老师可查看完成名单</p>
    </div>
<script>
// ========== 自定义配置 ==========
const TEACHER_PASSWORD = "laoshi2026";
const PRIVATE_KEY = 37591;
// =================================
// 按月生成兑换码，强制纯6位正数字，无负号
function getTodayCode() {
    const date = new Date();
    const y = date.getFullYear();
    const m = date.getMonth() + 1;
    let num = y * 100 + m;
    num = num * PRIVATE_KEY;
    num = num ^ 89273;
    num = num * 17;
    // 取绝对值消除负号，固定6位数字
    let absNum = Math.abs(num);
    let code = (absNum % 900000) + 100000;
    return code.toString();
}
function openTeacherModal() {
    document.getElementById("teacherModal").style.display = "flex";
}
function closeTeacherModal() {
    document.getElementById("teacherModal").style.display = "none";
    document.getElementById("teacherPwdInput").value = "";
}
function checkTeacherPwd() {
    const inputPwd = document.getElementById("teacherPwdInput").value.trim();
    if(inputPwd === TEACHER_PASSWORD) {
        const todayCode = getTodayCode();
        alert("本月有效兑换码：" + todayCode + "\n本月内全部可用，次月自动更新，仅6位数字");
        closeTeacherModal();
    } else {
        alert("教师密码错误，无权查看兑换码");
    }
}
function verifyAll() {
    const className = document.getElementById("className").value.trim();
    const stuName = document.getElementById("stuName").value.trim();
    const inputCode = document.getElementById("codeInput").value.trim();
    const realCode = getTodayCode();
    if(className === ""){
        alert("请填写你的班级！");
        return;
    }
    if(stuName === ""){
        alert("请填写你的姓名！");
        return;
    }
    if(inputCode === ""){
        alert("请输入本月6位数字兑换码！");
        return;
    }
    if(inputCode !== realCode){
        alert("兑换码错误，请向老师获取本月正确6位数字兑换码");
        return;
    }
    let recordList = JSON.parse(localStorage.getItem("stuRecord") || "[]");
    recordList.push({
        class: className,
        name: stuName,
        time: new Date().toLocaleString()
    });
    localStorage.setItem("stuRecord", JSON.stringify(recordList));
    document.getElementById("loginArea").style.display = "none";
    document.getElementById("courseArea").style.display = "block";
}
</script>
</body>
</html>
