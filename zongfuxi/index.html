let currentIndex = 0;
let userAnswers = {};
let userNLAnswers = {};
let nlChecked = {};
let nlScores = {};
let quizStarted = false;
let totalScore = 0;

function renderQuestion(q) {
  if (q.type === 'nonlinear') return renderNonlinear(q);
  return renderChoice(q);
}

function renderChoice(q) {
  let html = '<div class="question-card" id="q' + q.id + '">';
  html += '<span class="q-type choice">' + q.typeLabel + '</span>';
  html += '<div class="q-stem">' + q.id + '. ' + q.stem + '</div>';
  if (q.material) html += '<div class="q-material">' + q.material + '</div>';
  html += '<div class="options">';
  var letters = ['A','B','C','D','E','F'];
  q.options.forEach(function(opt, i) {
    var cls = 'option';
    var userAns = userAnswers[q.id];
    if (userAns !== undefined) {
      if (Array.isArray(q.answer)) {
        if (userAns.indexOf(i) >= 0) cls += ' selected';
        if (q.answer.indexOf(i) >= 0 && userAns.indexOf(i) >= 0) cls += ' correct';
        if (q.answer.indexOf(i) < 0 && userAns.indexOf(i) >= 0) cls += ' wrong';
      } else {
        if (userAns === i) cls += ' selected';
        if (q.answer === i) cls += ' correct';
        if (userAns === i && q.answer !== i) cls += ' wrong';
      }
    }
    html += '<div class="' + cls + '" onclick="selectOption(' + q.id + ',' + i + ',' + (Array.isArray(q.answer)?'true':'false') + ')">';
    html += '<span class="letter">' + letters[i] + '</span>';
    html += '<span>' + opt.substring(2).trim() + '</span></div>';
  });
  html += '</div><div class="feedback" id="fb' + q.id + '"></div></div>';
  return html;
}

function renderNonlinear(q) {
  var html = '<div class="nonlinear-card" id="q' + q.id + '">';
  html += '<div class="nl-header">' + q.typeLabel + ' - ' + q.nonlinearData.title + '</div>';
  html += '<div class="nl-body">';
  html += '<div class="q-material">' + q.material + '</div>';
  html += '<div class="nl-chart">' + renderNLSVG(q.nonlinearData) + '</div>';
  html += '<div class="nl-questions">';
  q.subQuestions.forEach(function(sq) {
    var checked = nlChecked[sq.id] || false;
    html += '<div class="nl-q"><div class="nl-q-title">' + sq.title + '</div>';
    html += '<textarea class="nl-answer-input" id="nlInput' + sq.id + '" placeholder="请输入你的答案..." ' + (checked?'disabled':'') + '>' + (userNLAnswers[sq.id]||'') + '</textarea>';
    html += '<button class="nl-check-btn" id="nlCheckBtn' + sq.id + '" ' + (checked?'disabled':'') + '>' + (checked?'已检查':'检查答案') + '</button>';
    html += '<div class="nl-feedback" id="nlFb' + sq.id + '"></div>';
    if (checked) html += '<div style="margin-top:8px;font-size:0.85em;color:#7d3c98;background:#f5eef8;padding:8px;border-radius:6px">参考答案：' + sq.ref + '</div>';
    html += '</div>';
  });
  html += '</div></div></div>';
  return html;
}

function renderNLSVG(data) {
  var colors = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
  var cx = 300, cy = 200, r = 140;
  var svg = '<svg viewBox="0 0 600 400" width="500" height="333"><text x="300" y="25" text-anchor="middle" font-size="16" font-weight="700" fill="#333">' + data.title + '</text>';
  var angle = -90;
  var total = data.items.length;
  data.items.forEach(function(item, i) {
    var startAngle = angle;
    var sweep = 360 / total;
    var endAngle = startAngle + sweep;
    var x1 = cx + r * Math.cos(startAngle * Math.PI / 180);
    var y1 = cy + r * Math.sin(startAngle * Math.PI / 180);
    var x2 = cx + r * Math.cos(endAngle * Math.PI / 180);
    var y2 = cy + r * Math.sin(endAngle * Math.PI / 180);
    var largeArc = sweep > 180 ? 1 : 0;
    svg += '<path d="M' + cx + ' ' + cy + ' L' + x1 + ' ' + y1 + ' A' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + x2 + ' ' + y2 + ' Z" fill="' + colors[i] + '" opacity="0.85" stroke="white" stroke-width="2"/>';
    var midAngle = (startAngle + endAngle) / 2;
    var labelR = r * 0.65;
    var lx = cx + labelR * Math.cos(midAngle * Math.PI / 180);
    var ly = cy + labelR * Math.sin(midAngle * Math.PI / 180);
    svg += '<text x="' + lx + '" y="' + ly + '" text-anchor="middle" font-size="12" fill="white" font-weight="600">' + item.label + '</text>';
    angle = endAngle;
  });
  svg += '</svg>';
  svg += '<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:10px">';
  data.items.forEach(function(item, i) {
    svg += '<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px"><span style="width:12px;height:12px;border-radius:3px;background:' + colors[i] + ';display:inline-block"></span>' + item.label + ': ' + item.desc + '</span>';
  });
  svg += '</div>';
  return svg;
}

function selectOption(qid, optIdx, isMulti) {
  if (userAnswers[qid] !== undefined) return;
  if (isMulti) {
    if (!userAnswers[qid]) userAnswers[qid] = [];
    var idx = userAnswers[qid].indexOf(optIdx);
    if (idx > -1) userAnswers[qid].splice(idx, 1);
    else userAnswers[qid].push(optIdx);
    renderAll();
    return;
  }
  userAnswers[qid] = optIdx;
  var q = questions.find(function(qq) { return qq.id === qid; });
  var correct = optIdx === q.answer;
  updateScore(qid, correct ? 5 : 0);
  var fb = document.getElementById('fb' + qid);
  fb.className = 'feedback show ' + (correct ? 'success' : 'error');
  fb.innerHTML = correct ? '回答正确！' + q.analysis : '回答错误。' + q.analysis;
  renderAll();
  updateProgress();
}

function checkNLAnswer(subId, qid) {
  var input = document.getElementById('nlInput' + subId);
  if (!input) return;
  var answer = input.value.trim();
  if (!answer) { alert('请先输入你的答案'); return; }
  userNLAnswers[subId] = answer;
  nlChecked[subId] = true;
  var q = questions.find(function(qq) { return qq.id === qid; });
  var sq = q.subQuestions.find(function(s) { return s.id === subId; });
  var match = sq.title.match(/(\d+)分/);
  var maxScore = match ? parseInt(match[1]) : 6;
  var score = 0;
  if (answer.length >= 30) score = Math.floor(maxScore * 0.7);
  if (answer.length >= 60) score = Math.floor(maxScore * 0.85);
  if (answer.length >= 100) score = maxScore;
  nlScores[subId] = score;
  updateScore(qid, score);
  renderAll();
  // 渲染后重新获取元素并设置反馈（因为 renderAll 用 innerHTML 替换了 DOM）
  setTimeout(function() {
    var fb = document.getElementById('nlFb' + subId);
    if (fb) {
      fb.className = 'nl-feedback show';
      fb.style.background = score >= maxScore * 0.7 ? '#eafaf1' : '#fef9e7';
      fb.style.border = '1px solid ' + (score >= maxScore * 0.7 ? '#27ae60' : '#f39c12');
      fb.innerHTML = '得分：' + score + '/' + maxScore + '分';
    }
    var btn = document.getElementById('nlCheckBtn' + subId);
    if (btn) btn.disabled = true;
  }, 50);
  updateProgress();
}

function updateScore(qid, score) {
  totalScore += score;
  document.getElementById('scoreDisplay').textContent = '得分: ' + totalScore;
}

function updateProgress() {
  var total = questions.length;
  var answered = 0;
  questions.forEach(function(q) {
    if (q.type === 'nonlinear') {
      if (q.subQuestions.every(function(sq) { return nlChecked[sq.id]; })) answered++;
    } else {
      if (userAnswers[q.id] !== undefined) answered++;
    }
  });
  var pct = Math.round((answered / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  if (answered >= total) {
    document.getElementById('submitBtn').classList.remove('hidden');
    document.getElementById('nextBtn').classList.add('hidden');
  }
}

function renderAll() {
  var area = document.getElementById('questionsArea');
  if (!quizStarted) return;
  var q = questions[currentIndex];
  area.innerHTML = renderQuestion(q);
  // 绑定非连续性文本的检查答案按钮
  if (q.type === 'nonlinear') {
    q.subQuestions.forEach(function(sq) {
      var btn = document.getElementById('nlCheckBtn' + sq.id);
      if (btn && !btn.dataset.bound) {
        btn.addEventListener('click', function() {
          checkNLAnswer(sq.id, q.id);
        });
        btn.dataset.bound = '1';
      }
    });
  }
  updateNavButtons();
  updateProgress();
  updateSectionIndicator();
}

function updateNavButtons() {
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  var total = questions.length;
  var answered = 0;
  questions.forEach(function(q) {
    if (q.type === 'nonlinear') {
      if (q.subQuestions.every(function(sq) { return nlChecked[sq.id]; })) answered++;
    } else {
      if (userAnswers[q.id] !== undefined) answered++;
    }
  });
  if (answered >= total) {
    document.getElementById('nextBtn').classList.add('hidden');
    document.getElementById('submitBtn').classList.remove('hidden');
  }
}

function updateSectionIndicator() {
  document.getElementById('sectionIndicator').textContent = '第 ' + (currentIndex + 1) + ' / ' + questions.length + ' 题';
}

function startQuiz() {
  quizStarted = true;
  document.getElementById('coverPage').classList.add('hidden');
  document.getElementById('questionsArea').classList.remove('hidden');
  document.getElementById('bottomNav').classList.remove('hidden');
  currentIndex = 0;
  renderAll();
}

function prevQuestion() {
  if (currentIndex > 0) { currentIndex--; renderAll(); }
}

function nextQuestion() {
  if (currentIndex < questions.length - 1) { currentIndex++; renderAll(); }
}

function submitAll() {
  var finalScore = 0;
  questions.forEach(function(q) {
    if (q.type === 'nonlinear') {
      q.subQuestions.forEach(function(sq) { finalScore += (nlScores[sq.id] || 0); });
    } else {
      if (userAnswers[q.id] !== undefined) {
        if (Array.isArray(q.answer)) {
          var userSet = {};
          userAnswers[q.id].forEach(function(v) { userSet[v] = true; });
          var correctSet = {};
          q.answer.forEach(function(v) { correctSet[v] = true; });
          var userKeys = Object.keys(userSet);
          var correctKeys = Object.keys(correctSet);
          if (userKeys.length === correctKeys.length && userKeys.every(function(v) { return correctSet[v]; })) finalScore += 5;
        } else {
          if (userAnswers[q.id] === q.answer) finalScore += 5;
        }
      }
    }
  });
  totalScore = finalScore;
  document.getElementById('scoreDisplay').textContent = '得分: ' + totalScore;
  document.getElementById('scoreCircle').textContent = totalScore;
  document.getElementById('scoreDetail').textContent = '满分100分，你得了 ' + totalScore + ' 分';
  var comment = '';
  if (totalScore >= 90) comment = '优秀！你对八上八下道法核心知识和时政热点掌握得非常扎实，法治素养很高！';
  else if (totalScore >= 70) comment = '良好！基础知识掌握较好，建议加强对非连续性文本的分析能力和宪法知识的学习。';
  else if (totalScore >= 50) comment = '还需努力！建议回顾八上「走进社会生活」「遵守社会规则」和八下「坚持宪法至上」等重点单元。';
  else comment = '加油！建议系统复习知识库中的全册知识点和电子课本，重点关注宪法和权利义务部分。';
  document.getElementById('resultComment').textContent = comment;
  document.getElementById('questionsArea').classList.add('hidden');
  document.getElementById('resultPanel').classList.add('show');
  document.getElementById('bottomNav').classList.add('hidden');
}

function reviewAll() {
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('questionsArea').classList.remove('hidden');
  document.getElementById('bottomNav').classList.remove('hidden');
  var allHtml = '';
  questions.forEach(function(q) { allHtml += renderQuestion(q); });
  document.getElementById('questionsArea').innerHTML = allHtml;
  document.getElementById('prevBtn').disabled = true;
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('submitBtn').classList.add('hidden');
  document.getElementById('sectionIndicator').textContent = '查看全部解析';
}

function resetQuiz() {
  userAnswers = {};
  userNLAnswers = {};
  nlChecked = {};
  nlScores = {};
  totalScore = 0;
  currentIndex = 0;
  quizStarted = false;
  document.getElementById('scoreDisplay').textContent = '得分: 0';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('questionsArea').classList.add('hidden');
  document.getElementById('coverPage').classList.remove('hidden');
  document.getElementById('bottomNav').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('submitBtn').classList.add('hidden');
}

document.addEventListener('keydown', function(e) {
  if (!quizStarted) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextQuestion(); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevQuestion(); }
});
