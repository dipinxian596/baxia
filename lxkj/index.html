function renderQuestion(q) {
  if (q.type === 'choice') return renderChoice(q);
  if (q.type === 'nonlinear') return renderNonlinear(q);
  return renderSubQuestion(q);
}

function renderChoice(q) {
  var srcTag = q.source === '八上' ? '<span class="source-badge a">八上</span>' : '<span class="source-badge b">八下</span>';
  var html = '<div class="question-card" id="q' + q.id + '">';
  html += '<span class="q-type a">单选题</span>' + srcTag;
  html += '<span style="float:right;color:#888;font-size:0.85em">' + q.score + '分</span>';
  html += '<div class="q-stem">' + q.id + '. ' + q.stem + '</div>';
  if (q.material) html += '<div class="q-material">' + q.material + '</div>';
  html += '<div class="options">';
  var letters = ['A','B','C','D','E','F'];
  q.options.forEach(function(opt, i) {
    var cls = 'option';
    var userAns = userAnswers[q.id];
    if (userAns !== undefined) {
      if (userAns === i) cls += ' selected';
      if (q.answer === i) cls += ' correct';
      if (userAns === i && q.answer !== i) cls += ' wrong';
    }
    html += '<div class="' + cls + '" onclick="selectChoice(' + q.id + ',' + i + ')">';
    html += '<span class="letter">' + letters[i] + '</span>';
    html += '<span>' + opt.substring(2).trim() + '</span></div>';
  });
  html += '</div><div class="feedback" id="fb' + q.id + '"></div></div>';
  return html;
}

function renderNonlinear(q) {
  var sec = sectionColors['五'];
  var html = '<div class="section-card" id="q' + q.id + '">';
  html += '<div class="s-header" style="background:' + sec.header + '">' + q.section + '<span class="score-badge">' + q.score + '分</span></div>';
  html += '<div class="s-body">';
  html += '<div class="q-material">' + q.material + '</div>';
  html += '<div class="nl-chart">' + renderNLSVG(q.nonlinearData) + '</div>';
  q.subQuestions.forEach(function(sq) { html += renderSubQItem(sq, q.id, sec); });
  html += '</div></div>';
  return html;
}

function renderSubQuestion(q) {
  var secKey = q.section.charAt(0);
  var sec = sectionColors[secKey] || { header: '#1a5276', btn: '#1a5276', typeClass: 'a', label: '大题' };
  var html = '<div class="section-card" id="q' + q.id + '">';
  html += '<div class="s-header" style="background:' + sec.header + '">' + q.section + '<span class="score-badge">' + q.score + '分</span></div>';
  html += '<div class="s-body">';
  if (q.stem) html += '<div class="q-stem">' + q.stem + '</div>';
  if (q.material) html += '<div class="q-material">' + q.material + '</div>';
  q.subQuestions.forEach(function(sq) { html += renderSubQItem(sq, q.id, sec); });
  html += '</div></div>';
  return html;
}

function renderSubQItem(sq, qid, sec) {
  var checked = subChecked[sq.id] || false;
  var html = '<div class="sub-q">';
  html += '<div class="sub-q-title">' + sq.title + '</div>';
  html += '<textarea class="sub-answer-input" id="subInput' + sq.id + '" placeholder="请输入你的答案..." ' + (checked?'disabled':'') + '>' + (userSubAnswers[sq.id]||'') + '</textarea>';
  html += '<button class="sub-check-btn" id="subCheckBtn' + sq.id + '" style="background:' + sec.btn + '" ' + (checked?'disabled':'') + '>' + (checked?'已检查':'检查答案') + '</button>';
  html += '<div class="sub-feedback" id="subFb' + sq.id + '"></div>';
  if (checked) {
    html += '<div style="margin-top:8px;font-size:0.85em;color:#555;background:#f5f5f5;padding:8px;border-radius:6px;border-left:3px solid ' + sec.btn + '">参考答案：' + sq.ref + '</div>';
  }
  html += '</div>';
  return html;
}

function renderNLSVG(data) {
  var colors = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
  var cx = 300, cy = 200, r = 140;
  var svg = '<svg viewBox="0 0 600 400" width="500" height="333"><text x="300" y="25" text-anchor="middle" font-size="16" font-weight="700" fill="#333">' + data.title + '</text>';
  var angle = -90;
  data.items.forEach(function(item, i) {
    var sweep = 360 / data.items.length;
    var startAngle = angle, endAngle = angle + sweep;
    var x1 = cx + r * Math.cos(startAngle * Math.PI / 180);
    var y1 = cy + r * Math.sin(startAngle * Math.PI / 180);
    var x2 = cx + r * Math.cos(endAngle * Math.PI / 180);
    var y2 = cy + r * Math.sin(endAngle * Math.PI / 180);
    svg += '<path d="M' + cx + ' ' + cy + ' L' + x1 + ' ' + y1 + ' A' + r + ' ' + r + ' 0 ' + (sweep>180?1:0) + ' 1 ' + x2 + ' ' + y2 + ' Z" fill="' + colors[i] + '" opacity="0.85" stroke="white" stroke-width="2"/>';
    var mid = (startAngle + endAngle) / 2;
    var lx = cx + r * 0.65 * Math.cos(mid * Math.PI / 180);
    var ly = cy + r * 0.65 * Math.sin(mid * Math.PI / 180);
    svg += '<text x="' + lx + '" y="' + ly + '" text-anchor="middle" font-size="12" fill="white" font-weight="600">' + item.label + '</text>';
    angle = endAngle;
  });
  svg += '</svg><div style="display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:10px">';
  data.items.forEach(function(item, i) {
    svg += '<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px"><span style="width:12px;height:12px;border-radius:3px;background:' + colors[i] + ';display:inline-block"></span>' + item.label + ': ' + item.desc + '</span>';
  });
  svg += '</div>';
  return svg;
}

function selectChoice(qid, optIdx) {
  if (userAnswers[qid] !== undefined) return;
  userAnswers[qid] = optIdx;
  var q = questions.find(function(qq) { return qq.id === qid; });
  var correct = optIdx === q.answer;
  totalScore += correct ? q.score : 0;
  updateScoreDisplay();
  var fb = document.getElementById('fb' + qid);
  fb.className = 'feedback show ' + (correct ? 'success' : 'error');
  fb.innerHTML = correct ? '回答正确！' + q.analysis : '回答错误。' + q.analysis;
  renderAll();
  updateProgress();
}

function checkSubAnswer(subId, qid) {
  var input = document.getElementById('subInput' + subId);
  if (!input) return;
  var answer = input.value.trim();
  if (!answer) { alert('请先输入你的答案'); return; }
  userSubAnswers[subId] = answer;
  subChecked[subId] = true;
  var q = questions.find(function(qq) { return qq.id === qid; });
  var sq = q.subQuestions.find(function(s) { return s.id === subId; });
  var match = sq.title.match(/（(\d+)分）/);
  var subScore = match ? parseInt(match[1]) : 3;
  var score = 0;
  if (answer.length >= 30) score = Math.floor(subScore * 0.7);
  if (answer.length >= 60) score = Math.floor(subScore * 0.85);
  if (answer.length >= 100) score = subScore;
  subScores[subId] = score;
  totalScore += score;
  updateScoreDisplay();
  renderAll();
  setTimeout(function() {
    var fb = document.getElementById('subFb' + subId);
    if (fb) {
      fb.className = 'sub-feedback show';
      fb.style.background = score >= subScore * 0.7 ? '#eafaf1' : '#fef9e7';
      fb.style.border = '1px solid ' + (score >= subScore * 0.7 ? '#27ae60' : '#f39c12');
      fb.innerHTML = '得分：' + score + '/' + subScore + '分';
    }
    var btn = document.getElementById('subCheckBtn' + subId);
    if (btn) btn.disabled = true;
  }, 50);
  updateProgress();
}

function updateScoreDisplay() {
  document.getElementById('scoreDisplay').textContent = '得分: ' + totalScore + '/' + maxScore;
}

function updateProgress() {
  var total = questions.length;
  var answered = 0;
  questions.forEach(function(q) {
    if (q.type === 'choice') {
      if (userAnswers[q.id] !== undefined) answered++;
    } else {
      if (q.subQuestions && q.subQuestions.every(function(sq) { return subChecked[sq.id]; })) answered++;
    }
  });
  var pct = Math.round((answered / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  if (answered >= total) {
    document.getElementById('submitBtn').classList.remove('hidden');
    document.getElementById('nextBtn').classList.add('hidden');
  }
}

function renderAll() {
  var area = document.getElementById('questionsArea');
  if (!quizStarted) return;
  var q = questions[currentIndex];
  area.innerHTML = renderQuestion(q);
  if (q.subQuestions) {
    q.subQuestions.forEach(function(sq) {
      var btn = document.getElementById('subCheckBtn' + sq.id);
      if (btn && !btn.dataset.bound) {
        btn.addEventListener('click', function() { checkSubAnswer(sq.id, q.id); });
        btn.dataset.bound = '1';
      }
    });
  }
  updateNavButtons();
  updateProgress();
  document.getElementById('sectionIndicator').textContent = '第 ' + (currentIndex + 1) + ' / ' + questions.length + ' 题';
}

function updateNavButtons() {
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  var total = questions.length;
  var answered = 0;
  questions.forEach(function(q) {
    if (q.type === 'choice') { if (userAnswers[q.id] !== undefined) answered++; }
    else { if (q.subQuestions && q.subQuestions.every(function(sq) { return subChecked[sq.id]; })) answered++; }
  });
  if (answered >= total) {
    document.getElementById('nextBtn').classList.add('hidden');
    document.getElementById('submitBtn').classList.remove('hidden');
  }
}

function startQuiz() {
  quizStarted = true;
  document.getElementById('coverPage').classList.add('hidden');
  document.getElementById('questionsArea').classList.remove('hidden');
  document.getElementById('bottomNav').classList.remove('hidden');
  currentIndex = 0;
  renderAll();
}

function prevQuestion() { if (currentIndex > 0) { currentIndex--; renderAll(); } }
function nextQuestion() { if (currentIndex < questions.length - 1) { currentIndex++; renderAll(); } }

function submitAll() {
  var finalScore = 0;
  questions.forEach(function(q) {
    if (q.type === 'choice') {
      if (userAnswers[q.id] !== undefined && userAnswers[q.id] === q.answer) finalScore += q.score;
    } else {
      if (q.subQuestions) q.subQuestions.forEach(function(sq) { finalScore += (subScores[sq.id] || 0); });
    }
  });
  totalScore = finalScore;
  updateScoreDisplay();
  document.getElementById('scoreCircle').textContent = totalScore;
  document.getElementById('scoreDetail').textContent = '满分75分，你得了 ' + totalScore + ' 分';
  var comment = '';
  if (totalScore >= 68) comment = '优秀！你对八上八下道法核心知识和时政热点掌握扎实，法治素养很高！';
  else if (totalScore >= 52) comment = '良好！基础知识掌握较好，建议加强对宪法知识和国家机构的理解。';
  else if (totalScore >= 38) comment = '还需努力！建议回顾八下「坚持宪法至上」「理解权利义务」和八上「遵守社会规则」等重点单元。';
  else comment = '加油！建议系统复习知识库中的全册知识点和电子课本，重点关注宪法部分。';
  document.getElementById('resultComment').textContent = comment;
  document.getElementById('questionsArea').classList.add('hidden');
  document.getElementById('resultPanel').classList.add('show');
  document.getElementById('bottomNav').classList.add('hidden');
}

function reviewAll() {
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('questionsArea').classList.remove('hidden');
  document.getElementById('bottomNav').classList.remove('hidden');
  var allHtml = '';
  questions.forEach(function(q) { allHtml += renderQuestion(q); });
  document.getElementById('questionsArea').innerHTML = allHtml;
  questions.forEach(function(q) {
    if (q.subQuestions) {
      q.subQuestions.forEach(function(sq) {
        var btn = document.getElementById('subCheckBtn' + sq.id);
        if (btn && !btn.dataset.bound) {
          btn.addEventListener('click', function() { checkSubAnswer(sq.id, q.id); });
          btn.dataset.bound = '1';
        }
      });
    }
  });
  document.getElementById('prevBtn').disabled = true;
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('submitBtn').classList.add('hidden');
  document.getElementById('sectionIndicator').textContent = '查看全部解析';
}

function resetQuiz() {
  userAnswers = {}; userSubAnswers = {}; subChecked = {}; subScores = {};
  totalScore = 0; currentIndex = 0; quizStarted = false;
  updateScoreDisplay();
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('questionsArea').classList.add('hidden');
  document.getElementById('coverPage').classList.remove('hidden');
  document.getElementById('bottomNav').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('submitBtn').classList.add('hidden');
}

document.addEventListener('keydown', function(e) {
  if (!quizStarted) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextQuestion(); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevQuestion(); }
});

</script>
</body>
</html>
